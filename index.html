<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тест по фишингу</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #1d2433;
      --muted: #647087;
      --line: #dfe4ee;
      --blue: #2457d6;
      --blue-soft: #e9efff;
      --green: #18805d;
      --red: #c93737;
      --shadow: 0 18px 60px rgba(28, 39, 64, 0.12);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
    }

    button, input, select, textarea {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: #1b3f9c;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .admin-link {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .student-panel {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #38445a;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(36, 87, 214, 0.14);
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: #edf1f7;
      overflow: hidden;
      margin: 16px 0 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--green);
      transition: width 0.2s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
    }

    .quiz {
      padding: 18px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      background: #fff;
    }

    .question-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 13px;
    }

    .badge {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--blue-soft);
      color: #173b96;
      font-weight: 800;
      font-size: 14px;
    }

    .question h2 {
      margin: 2px 0 0;
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    .option {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: #fbfcff;
    }

    .option:hover {
      border-color: #a9b9dd;
      background: #f4f7ff;
    }

    .option input {
      margin: 2px 0 0;
      width: 18px;
      height: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 18px;
    }

    .primary-btn, .secondary-btn {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .primary-btn {
      background: var(--blue);
      color: #fff;
    }

    .primary-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
    }

    .notice {
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 14px;
      display: none;
      font-size: 14px;
      line-height: 1.45;
    }

    .notice.show { display: block; }
    .notice.ok { background: #eaf7f2; color: #0b5c43; border: 1px solid #b7dece; }
    .notice.err { background: #fff0f0; color: #963131; border: 1px solid #f0c0c0; }

    .admin-view {
      display: none;
      padding: 18px;
    }

    .admin-view.active {
      display: block;
    }

    .admin-login {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    .admin-tools {
      display: none;
      gap: 14px;
      margin: 16px 0;
    }

    .admin-tools.active {
      display: grid;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #fbfcff;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .stat-value {
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1.4fr auto;
      gap: 10px;
      align-items: end;
    }

    .chart-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .chart-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .chart {
      display: grid;
      gap: 9px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 48px;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #edf1f7;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--blue);
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin: 6px 0 12px;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      background: #eaf7f2;
      color: #0b5c43;
      font-weight: 800;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    summary {
      cursor: pointer;
      font-weight: 800;
    }

    .answer-row {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #f8f9fc;
      font-size: 14px;
      line-height: 1.45;
    }

    .answer-row.good { border-left: 4px solid var(--green); }
    .answer-row.bad { border-left: 4px solid var(--red); }

    .hidden {
      display: none !important;
    }

    @media (max-width: 820px) {
      body {
        background: #fff;
      }

      .shell {
        width: 100%;
        padding: 14px 12px 28px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 12px;
        padding: 0 2px;
      }

      .brand {
        width: 100%;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      .brand h1 {
        font-size: 26px;
        line-height: 1.1;
      }

      .brand p {
        font-size: 13px;
        line-height: 1.35;
      }

      .admin-link {
        width: 100%;
        padding: 12px 14px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .panel {
        border-radius: 8px;
        box-shadow: none;
      }

      .student-panel {
        position: static;
        padding: 14px;
      }

      .quiz {
        padding: 0;
        border: 0;
      }

      .field {
        margin-bottom: 12px;
      }

      input, select, textarea {
        min-height: 46px;
        font-size: 16px;
      }

      .question {
        padding: 14px;
        margin-bottom: 10px;
        border-radius: 8px;
      }

      .question-head {
        gap: 9px;
        margin-bottom: 12px;
      }

      .badge {
        width: 28px;
        height: 28px;
        border-radius: 7px;
      }

      .question h2 {
        font-size: 16px;
      }

      .option {
        grid-template-columns: 22px minmax(0, 1fr);
        gap: 9px;
        padding: 13px 12px;
        min-height: 50px;
      }

      .option input {
        width: 20px;
        height: 20px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 4px 0 0;
      }

      .primary-btn,
      .secondary-btn {
        width: 100%;
        min-height: 48px;
        padding: 13px 14px;
      }

      .admin-view {
        padding: 14px;
      }

      .admin-login {
        grid-template-columns: 1fr;
      }

      .stats-grid,
      .filters {
        grid-template-columns: 1fr;
      }

      .bar-row {
        grid-template-columns: 58px minmax(0, 1fr) 44px;
      }

      .result-card {
        padding: 12px;
      }

      .result-meta {
        display: grid;
        gap: 6px;
      }

      .score-pill {
        justify-content: center;
        width: fit-content;
      }

      .answer-row {
        font-size: 13px;
      }
    }

    @media (max-width: 420px) {
      .shell {
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }

      .brand h1 {
        font-size: 24px;
      }

      .brand p {
        max-width: 30ch;
      }

      .student-panel,
      .question,
      .admin-view {
        padding: 12px;
      }

      .question h2 {
        font-size: 15px;
      }

      .option {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">Ф</div>
        <div>
          <h1>Тест по фишингу</h1>
          <p>Выберите класс, ответьте на вопросы и отправьте результат учителю.</p>
        </div>
      </div>
      <button class="admin-link hidden" id="adminToggle" type="button" aria-hidden="true" tabindex="-1">Админ</button>
    </div>

    <section class="layout" id="studentView">
      <aside class="panel student-panel">
        <div class="field">
          <label for="studentName">Имя и фамилия</label>
          <input id="studentName" autocomplete="name" placeholder="Например: Алия Нурланова">
        </div>
        <div class="field">
          <label for="studentGrade">Класс</label>
          <select id="studentGrade">
            <option value="">Выберите класс</option>
            <option>1 класс</option>
            <option>2 класс</option>
            <option>3 класс</option>
            <option>4 класс</option>
            <option>5 класс</option>
            <option>6 класс</option>
            <option>7 класс</option>
            <option>8 класс</option>
            <option>9 класс</option>
            <option>10 класс</option>
            <option>11 класс</option>
          </select>
        </div>
        <div class="field">
          <label for="studentGroup">Группа или кабинет</label>
          <input id="studentGroup" placeholder="Можно оставить пустым">
        </div>
        <div class="progress" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Отвечено 0 из 10</div>
        <div class="notice" id="studentNotice"></div>
      </aside>

      <form class="panel quiz" id="quizForm">
        <div id="questions"></div>
        <div class="actions">
          <button class="primary-btn" id="submitBtn" type="submit">Отправить ответы</button>
          <button class="secondary-btn" id="resetBtn" type="button">Очистить</button>
        </div>
      </form>
    </section>

    <section class="panel admin-view" id="adminView">
      <div class="admin-login">
        <input id="adminPassword" type="password" placeholder="Пароль администратора">
        <button class="primary-btn" id="loadResults" type="button">Показать результаты</button>
      </div>
      <div class="actions">
        <button class="secondary-btn" id="backToQuiz" type="button">Вернуться к тесту</button>
        <button class="secondary-btn" id="downloadCsv" type="button">Скачать CSV</button>
      </div>
      <div class="notice" id="adminNotice"></div>
      <div class="admin-tools" id="adminTools">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="filters">
          <div class="field">
            <label for="levelFilter">Уровень школы</label>
            <select id="levelFilter">
              <option value="all">Все уровни</option>
              <option value="primary">Начальная школа 1-4</option>
              <option value="middle">Средняя школа 5-8</option>
              <option value="high">Старшая школа 9-11</option>
            </select>
          </div>
          <div class="field">
            <label for="gradeFilter">Класс</label>
            <select id="gradeFilter">
              <option value="all">Все классы</option>
            </select>
          </div>
          <div class="field">
            <label for="searchFilter">Поиск ученика</label>
            <input id="searchFilter" placeholder="Имя, фамилия или группа">
          </div>
          <button class="secondary-btn" id="clearFilters" type="button">Сбросить</button>
        </div>
        <div class="chart-panel">
          <div class="chart-title">
            <span>Средний результат по классам</span>
            <span id="chartHint"></span>
          </div>
          <div class="chart" id="gradeChart"></div>
        </div>
      </div>
      <div class="results" id="results"></div>
    </section>
  </main>

  <script>
    const QUESTIONS = [
      {
        id: "q1",
        text: "Вам пришло сообщение: «Вы выиграли телефон. Нажмите ссылку и введите данные». Что правильнее сделать?",
        options: ["Перейти по ссылке сразу", "Не нажимать и показать взрослому или учителю", "Отправить ссылку друзьям"]
      },
      {
        id: "q2",
        text: "Какой пароль выглядит безопаснее?",
        options: ["12345678", "Aruzhan2012", "Tumar!47_Koktem"]
      },
      {
        id: "q3",
        text: "Сайт просит логин и пароль от школьного аккаунта, но адрес похож на kundelik-login-free.com. Что это может быть?",
        options: ["Фишинговый сайт", "Официальный сайт", "Обычная реклама"]
      },
      {
        id: "q4",
        text: "Незнакомец в игре просит пароль, обещая подарить редкий предмет. Как поступить?",
        options: ["Дать пароль на 5 минут", "Не давать пароль никому", "Дать только логин и код из SMS"]
      },
      {
        id: "q5",
        text: "Почему опасно вводить код из SMS по просьбе другого человека?",
        options: ["Код может дать доступ к аккаунту или деньгам", "Код нужен только для красоты", "SMS-код всегда можно сообщать"]
      },
      {
        id: "q6",
        text: "В письме написано: «Ваш аккаунт заблокируют через 10 минут». Какой приём использует мошенник?",
        options: ["Срочность и давление", "Помощь в обучении", "Проверку грамотности"]
      },
      {
        id: "q7",
        text: "Какой адрес выглядит наиболее надёжным для входа в Google?",
        options: ["https://accounts.google.com", "https://google.login-check.xyz", "https://accounts.google.com.verify.kz"]
      },
      {
        id: "q8",
        text: "Друг прислал короткую ссылку bit.ly без объяснения. Что лучше сделать?",
        options: ["Сразу открыть", "Уточнить у друга, что это, и не открывать подозрительное", "Переслать в общий чат"]
      },
      {
        id: "q9",
        text: "Что лучше сделать, если подозрительное письмо пришло от имени банка?",
        options: ["Ответить письмом и спросить", "Самостоятельно зайти на официальный сайт или позвонить по официальному номеру", "Ввести данные карты для проверки"]
      },
      {
        id: "q10",
        text: "Что НЕ относится к личным данным?",
        options: ["Пароль от аккаунта", "Адрес школы и номер телефона", "Любимый цвет без имени и контактов"]
      }
    ];

    const state = {
      results: []
    };

    const els = {
      questions: document.querySelector("#questions"),
      form: document.querySelector("#quizForm"),
      progressFill: document.querySelector("#progressFill"),
      progressText: document.querySelector("#progressText"),
      notice: document.querySelector("#studentNotice"),
      submitBtn: document.querySelector("#submitBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      studentName: document.querySelector("#studentName"),
      studentGrade: document.querySelector("#studentGrade"),
      studentGroup: document.querySelector("#studentGroup"),
      studentView: document.querySelector("#studentView"),
      adminView: document.querySelector("#adminView"),
      adminToggle: document.querySelector("#adminToggle"),
      backToQuiz: document.querySelector("#backToQuiz"),
      adminPassword: document.querySelector("#adminPassword"),
      loadResults: document.querySelector("#loadResults"),
      adminNotice: document.querySelector("#adminNotice"),
      results: document.querySelector("#results"),
      downloadCsv: document.querySelector("#downloadCsv"),
      adminTools: document.querySelector("#adminTools"),
      statsGrid: document.querySelector("#statsGrid"),
      levelFilter: document.querySelector("#levelFilter"),
      gradeFilter: document.querySelector("#gradeFilter"),
      searchFilter: document.querySelector("#searchFilter"),
      clearFilters: document.querySelector("#clearFilters"),
      gradeChart: document.querySelector("#gradeChart"),
      chartHint: document.querySelector("#chartHint")
    };

    function renderQuestions() {
      els.questions.innerHTML = QUESTIONS.map((question, index) => `
        <article class="question">
          <div class="question-head">
            <div class="badge">${index + 1}</div>
            <h2>${question.text}</h2>
          </div>
          <div class="options">
            ${question.options.map((option, optionIndex) => `
              <label class="option">
                <input type="radio" name="${question.id}" value="${optionIndex}">
                <span>${option}</span>
              </label>
            `).join("")}
          </div>
        </article>
      `).join("");
    }

    function collectAnswers() {
      return QUESTIONS.map((question) => {
        const selected = document.querySelector(`input[name="${question.id}"]:checked`);
        return {
          questionId: question.id,
          selectedIndex: selected ? Number(selected.value) : null
        };
      });
    }

    function updateProgress() {
      const answered = collectAnswers().filter((item) => item.selectedIndex !== null).length;
      const percent = Math.round((answered / QUESTIONS.length) * 100);
      els.progressFill.style.width = `${percent}%`;
      els.progressText.textContent = `Отвечено ${answered} из ${QUESTIONS.length}`;
    }

    function showNotice(element, type, text) {
      element.className = `notice show ${type}`;
      element.textContent = text;
    }

    function hideNotice(element) {
      element.className = "notice";
      element.textContent = "";
    }

    async function submitQuiz(event) {
      event.preventDefault();
      hideNotice(els.notice);

      const name = els.studentName.value.trim();
      const grade = els.studentGrade.value;
      const group = els.studentGroup.value.trim();
      const answers = collectAnswers();
      const missing = answers.some((item) => item.selectedIndex === null);

      if (!name || !grade) {
        showNotice(els.notice, "err", "Заполните имя и выберите класс.");
        return;
      }

      if (missing) {
        showNotice(els.notice, "err", "Ответьте на все 10 вопросов перед отправкой.");
        return;
      }

      els.submitBtn.disabled = true;
      els.submitBtn.textContent = "Отправляем...";

      try {
        const response = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, grade, group, answers })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "Не удалось отправить ответы.");

        showNotice(els.notice, "ok", "Ответы отправлены. Результат увидит администратор.");
        els.form.reset();
        updateProgress();
      } catch (error) {
        showNotice(els.notice, "err", error.message);
      } finally {
        els.submitBtn.disabled = false;
        els.submitBtn.textContent = "Отправить ответы";
      }
    }

    function showAdmin() {
      els.studentView.classList.add("hidden");
      els.adminView.classList.add("active");
      hideNotice(els.notice);
      if (location.hash !== "#admin") {
        history.replaceState(null, "", "#admin");
      }
    }

    function showQuiz() {
      els.studentView.classList.remove("hidden");
      els.adminView.classList.remove("active");
      hideNotice(els.adminNotice);
      if (location.hash === "#admin") {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }

    async function loadResults() {
      hideNotice(els.adminNotice);
      const password = els.adminPassword.value;
      if (!password) {
        showNotice(els.adminNotice, "err", "Введите пароль администратора.");
        return;
      }

      els.loadResults.disabled = true;
      els.loadResults.textContent = "Загрузка...";

      try {
        const response = await fetch("/api/admin", {
          headers: { "x-admin-password": password }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Не удалось загрузить результаты.");
        state.results = data.submissions || [];
        populateGradeFilter();
        els.adminTools.classList.add("active");
        renderResults();
      } catch (error) {
        showNotice(els.adminNotice, "err", error.message);
      } finally {
        els.loadResults.disabled = false;
        els.loadResults.textContent = "Показать результаты";
      }
    }

    function gradeNumber(grade) {
      const match = String(grade || "").match(/\d+/);
      return match ? Number(match[0]) : 0;
    }

    function schoolLevel(grade) {
      const number = gradeNumber(grade);
      if (number >= 1 && number <= 4) return "primary";
      if (number >= 5 && number <= 8) return "middle";
      if (number >= 9 && number <= 11) return "high";
      return "unknown";
    }

    function levelLabel(level) {
      return {
        primary: "Начальная школа",
        middle: "Средняя школа",
        high: "Старшая школа",
        unknown: "Без уровня"
      }[level] || "Все уровни";
    }

    function populateGradeFilter() {
      const selected = els.gradeFilter.value;
      const grades = [...new Set(state.results.map((item) => item.grade).filter(Boolean))]
        .sort((a, b) => gradeNumber(a) - gradeNumber(b));
      els.gradeFilter.innerHTML = `<option value="all">Все классы</option>${grades.map((grade) => `
        <option value="${escapeHtml(grade)}">${escapeHtml(grade)}</option>
      `).join("")}`;
      if (grades.includes(selected)) {
        els.gradeFilter.value = selected;
      }
    }

    function filteredResults() {
      const level = els.levelFilter.value;
      const grade = els.gradeFilter.value;
      const query = els.searchFilter.value.trim().toLowerCase();

      return state.results.filter((item) => {
        const itemLevel = schoolLevel(item.grade);
        const text = `${item.name || ""} ${item.grade || ""} ${item.group || ""}`.toLowerCase();
        return (level === "all" || itemLevel === level)
          && (grade === "all" || item.grade === grade)
          && (!query || text.includes(query));
      });
    }

    function averageScore(items) {
      if (items.length === 0) return 0;
      const percent = items.reduce((sum, item) => sum + (item.score / item.total) * 100, 0) / items.length;
      return Math.round(percent);
    }

    function renderStats(items) {
      const avg = averageScore(items);
      const perfect = items.filter((item) => item.score === item.total).length;
      const weak = items.filter((item) => item.score <= Math.floor(item.total * 0.5)).length;
      els.statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Работ в фильтре</div>
          <div class="stat-value">${items.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Средний результат</div>
          <div class="stat-value">${avg}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">На максимум</div>
          <div class="stat-value">${perfect}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Нужно повторить</div>
          <div class="stat-value">${weak}</div>
        </div>
      `;
    }

    function renderChart(items) {
      const groups = new Map();
      for (const item of items) {
        const grade = item.grade || "Без класса";
        if (!groups.has(grade)) groups.set(grade, []);
        groups.get(grade).push(item);
      }

      const rows = [...groups.entries()]
        .sort((a, b) => gradeNumber(a[0]) - gradeNumber(b[0]))
        .map(([grade, gradeItems]) => ({
          grade,
          count: gradeItems.length,
          avg: averageScore(gradeItems)
        }));

      els.chartHint.textContent = rows.length ? `${rows.length} классов` : "";
      els.gradeChart.innerHTML = rows.length ? rows.map((row) => `
        <div class="bar-row">
          <strong>${escapeHtml(row.grade)}</strong>
          <div class="bar-track"><div class="bar-fill" style="width: ${row.avg}%"></div></div>
          <span>${row.avg}%</span>
        </div>
      `).join("") : "<p>Нет данных для графика.</p>";
    }

    function renderResults() {
      const items = filteredResults();
      renderStats(items);
      renderChart(items);

      if (state.results.length === 0) {
        els.results.innerHTML = "<p>Пока нет отправленных работ.</p>";
        return;
      }

      if (items.length === 0) {
        els.results.innerHTML = "<p>По выбранным фильтрам ничего не найдено.</p>";
        return;
      }

      els.results.innerHTML = items.map((item) => `
        <article class="result-card">
          <strong>${escapeHtml(item.name)}</strong>
          <div class="result-meta">
            <span>${escapeHtml(item.grade)}</span>
            ${item.group ? `<span>${escapeHtml(item.group)}</span>` : ""}
            <span>${new Date(item.createdAt).toLocaleString("ru-RU")}</span>
            <span class="score-pill">${item.score} / ${item.total}</span>
          </div>
          <details>
            <summary>Показать ответы</summary>
            ${item.review.map((answer, index) => `
              <div class="answer-row ${answer.isCorrect ? "good" : "bad"}">
                <strong>${index + 1}. ${escapeHtml(answer.question)}</strong><br>
                Ответ ученика: ${escapeHtml(answer.selectedText)}<br>
                Правильный ответ: ${escapeHtml(answer.correctText)}
              </div>
            `).join("")}
          </details>
        </article>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function downloadCsv() {
      const items = filteredResults();
      if (items.length === 0) {
        showNotice(els.adminNotice, "err", "Сначала загрузите результаты.");
        return;
      }

      const rows = [
        ["Имя", "Класс", "Уровень", "Группа", "Дата", "Баллы", "Всего", "Процент"],
        ...items.map((item) => [
          item.name,
          item.grade,
          levelLabel(schoolLevel(item.grade)),
          item.group || "",
          new Date(item.createdAt).toLocaleString("ru-RU"),
          item.score,
          item.total,
          `${Math.round((item.score / item.total) * 100)}%`
        ])
      ];
      const csv = rows.map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "phishing-quiz-results.csv";
      link.click();
      URL.revokeObjectURL(url);
    }

    renderQuestions();
    updateProgress();

    els.form.addEventListener("change", updateProgress);
    els.form.addEventListener("submit", submitQuiz);
    els.resetBtn.addEventListener("click", () => {
      els.form.reset();
      updateProgress();
      hideNotice(els.notice);
    });
    if (location.hash === "#admin") {
      showAdmin();
    }

    window.addEventListener("hashchange", () => {
      if (location.hash === "#admin") showAdmin();
    });

    document.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.altKey && event.key.toLowerCase() === "a") {
        showAdmin();
      }
    });

    els.adminToggle.addEventListener("click", showAdmin);
    els.backToQuiz.addEventListener("click", showQuiz);
    els.loadResults.addEventListener("click", loadResults);
    els.downloadCsv.addEventListener("click", downloadCsv);
    els.levelFilter.addEventListener("change", renderResults);
    els.gradeFilter.addEventListener("change", renderResults);
    els.searchFilter.addEventListener("input", renderResults);
    els.clearFilters.addEventListener("click", () => {
      els.levelFilter.value = "all";
      els.gradeFilter.value = "all";
      els.searchFilter.value = "";
      renderResults();
    });
  </script>
</body>
</html>
